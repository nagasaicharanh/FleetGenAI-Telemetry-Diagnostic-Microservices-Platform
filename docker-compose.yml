services:
  redis:
    image: redis:alpine
    container_name: fleetgenai-redis
    ports:
      - "6379:6379"

  gateway:
    build:
      context: .\gateway
    container_name: fleetgenai-gateway
    environment:
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    depends_on:
      - redis

  ai-worker:
    build:
      context: .\ai-worker
    container_name: fleetgenai-ai-worker
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
    ports:
      - "8000:8000"
    depends_on:
      - redis

  dashboard:
    build:
      context: .\dashboard
    container_name: fleetgenai-dashboard
    environment:
      VITE_GATEWAY_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - gateway
